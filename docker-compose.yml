services:

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: storage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: storageuser
      POSTGRES_PASSWORD: storagepass
      POSTGRES_DB: storagedb
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storageuser -d storagedb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis
  redis:
    image: redis:7-alpine
    container_name: storage_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO
  minio:
    image: quay.io/minio/minio
    container_name: storage_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # API + Worker server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storage_api
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      PORT: "8080"

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: storageuser
      DB_PASSWORD: storagepass
      DB_NAME: storagedb
      DB_SSLMODE: disable

      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: documents
      STORAGE_USE_SSL: "false"

      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      WORKER_CONCURRENCY: "10"

      JWT_SECRET: "change-me-in-production"
      JWT_EXPIRY_HOURS: "24"
      PRESIGNED_URL_MINUTES: "60"        # 1 hour for backend consumers

      DEFAULT_QUOTA_BYTES: "10737418240" # 10 GB

      PROCESSING_TIMEOUT_MINUTES: "30"
      RATE_LIMIT_UPLOADS_PER_MINUTE: "10"

      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Asynq dashboard (asynqmon)
  # Web UI for monitoring the task queue.
  # Access at http://localhost:8082
  asynqmon:
    image: hibiken/asynqmon
    container_name: storage_asynqmon
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
