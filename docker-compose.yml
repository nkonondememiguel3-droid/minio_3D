services:

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: storage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: storageuser
      POSTGRES_PASSWORD: storagepass
      POSTGRES_DB: storagedb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storageuser -d storagedb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis (Asynq task queue)
  redis:
    image: redis:7-alpine
    container_name: storage_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO (S3 like service)
  minio:
    image: quay.io/minio/minio
    container_name: storage_minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # API + Worker server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storage_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"

      # PostgreSQL
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: storageuser
      DB_PASSWORD: storagepass
      DB_NAME: storagedb
      DB_SSLMODE: disable

      # MinIO
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: documents
      STORAGE_USE_SSL: "false"

      # Redis
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      WORKER_CONCURRENCY: "10"

      # Auth
      JWT_SECRET: "change-me-in-production"
      JWT_EXPIRY_HOURS: "24"
      PRESIGNED_URL_MINUTES: "15"

      # Quotas
      DEFAULT_QUOTA_BYTES: "10737418240"   # 10 GB

      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
